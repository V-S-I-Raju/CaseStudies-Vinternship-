<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Internship Portfolio</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(to right, #818cf8, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1000px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: block;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card h2 {
            margin-top: 0;
            color: #818cf8;
        }

        .card p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Internship Learning Experience</h1>
        <p>Exploring TypeScript, React, MongoDB & Express</p>
    </header>

    <div class="container">
        <a href="./1_Typescript/CaseStudy1/" class="card">
            <h2>Case Study 1</h2>
        </a>

        <a href="./1_Typescript/CaseStudy2/" class="card">
            <h2>Case Study 2</h2>
        </a>

        <a href="./1_Typescript/CaseStudy3/" class="card">
            <h2>Case Study 3</h2>
        </a>
    </div>

</body>
</html>
